server:
  port: 9000

spring:
  application:
    name: rqzb-gateway-service
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: true
      routes:
        - id: rqzb-auth-service
          uri: http://localhost:9001
          predicates:
            - Path=/api/auth/**
        - id: rqzb-system-service
          uri: http://localhost:9002
          predicates:
            - Path=/api/system/**
        - id: rqzb-renqing-service
          uri: http://localhost:9003
          predicates:
            - Path=/api/renqing/**
        - id: rqzb-userinfo-service
          uri: http://localhost:9004
          predicates:
            - Path=/api/userinfo/**

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls:
      - name: auth-service
        url: /api/auth/v3/api-docs
      - name: system-service
        url: /api/system/v3/api-docs
      - name: renqing-service
        url: /api/renqing/v3/api-docs
      - name: userinfo-service
        url: /api/userinfo/v3/api-docs

sa-token:
  jwt-secret-key: ${RQZB_JWT_SECRET:rqzb-local-dev-jwt-secret-change-me}
