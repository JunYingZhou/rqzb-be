server:
  port: 9002

spring:
  application:
    name: rqzb-system-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/rqzb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: "075454"

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.rqzb.system.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  jwt-secret-key: ${RQZB_JWT_SECRET:rqzb-local-dev-jwt-secret-change-me}
  is-log: true

rqzb:
  ai:
    enabled: ${RQZB_AI_ENABLED:false}
    api-key: ${DASHSCOPE_API_KEY:}
    base-url: ${RQZB_AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    chat-model: ${RQZB_AI_CHAT_MODEL:qwen-plus}
    timeout: ${RQZB_AI_TIMEOUT:30s}
    log-requests: false
    log-responses: false
  thread-pool:
    core-size: 4
    max-size: 8
    queue-capacity: 1024
    keep-alive-seconds: 60
    allow-core-thread-timeout: false
    thread-name-prefix: rqzb-worker-
    await-termination-seconds: 30
